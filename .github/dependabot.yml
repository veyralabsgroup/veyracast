version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    ignore:
      # Major bumps land breaking changes and fail CI; upgrade those by hand.
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
